name: Cloud Platform Deploy
description: Deploy to Cloud Platform using Helm
inputs:
  version:
    description: The version of the service to deploy
    required: true
  api:
    description: The KUBE_ENV_API
    required: true
  cert:
    description: The KUBE_CERT
    required: true
  cluster:
    description: The KUBE_CLUSTER
    required: true
  namespace:
    description: The KUBE_NAMESPACE
    required: true
  token:
    description: The KUBE_TOKEN
    required: true
  gh_auth_token:
    description: Auth token for Github
    required: true
  github_org:
    description: The github org in which the runners are deployed
    required: true
  runner_label:
    description: The labels for the runners
    required: true
  runner_group:
    description: The runner group for the runners
    required: true  

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    # Setup kubectl
    - uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/tool-installers/setup-kubectl@c9b92b85a2aa7e313fb377a81fec08dd4f6f15b8 # v1
    - name: Authenticate
      shell: bash
      run: |
        echo "${{ inputs.cert }}" > ca.crt
        kubectl config set-cluster ${{ inputs.cluster }} --certificate-authority=./ca.crt --server=${{ inputs.api }}
        kubectl config set-credentials cd-serviceaccount --token=${{ inputs.token }}
        kubectl config set-context ${{ inputs.cluster }} --cluster=${{ inputs.cluster }} --user=cd-serviceaccount --namespace=${{ inputs.namespace }}
        kubectl config use-context ${{ inputs.cluster }}
    # Setup helm
    - uses: ministryofjustice/hmpps-github-shared-actions/.github/actions/tool-installers/setup-helm@c9b92b85a2aa7e313fb377a81fec08dd4f6f15b8 # v1
    - name: Deploy
      shell: bash
      run: |
        # Delete any pods stuck in CrashLoopBackOff or that are Running but not
        # Ready (idle-sleeping on an expired token). The StatefulSet controller
        # will recreate them with the new spec (including a fresh GH_AUTH_TOKEN)
        # once the helm upgrade applies.
        echo "Checking for stuck pods..."
        stuck_pods=$(
          kubectl get pods -l app.kubernetes.io/name=${{ github.event.repository.name }} -o json 2>/dev/null \
            | jq -r '
              .items[] | select(
                # CrashLoopBackOff or Error
                (.status.containerStatuses[]? | .state.waiting.reason == "CrashLoopBackOff" or .state.waiting.reason == "Error")
                or
                # Running but container not ready (idle-sleeping on expired token)
                (.status.phase == "Running" and (.status.containerStatuses[]? | .ready == false))
              ) | .metadata.name'
        ) || true
        if [[ -n "${stuck_pods}" ]]; then
          echo "Deleting stuck pods: ${stuck_pods}"
          echo "${stuck_pods}" | xargs kubectl delete pod --wait=false || true
        else
          echo "No stuck pods found"
        fi

        yq -i ".appVersion = \"${{ inputs.version }}\"" "helm_deploy/${{ github.event.repository.name }}/Chart.yaml"
        helm dependency build "helm_deploy/${{ github.event.repository.name }}"
        exec helm upgrade '${{ github.event.repository.name }}' 'helm_deploy/${{ github.event.repository.name }}' \
          --cleanup-on-fail \
          --history-max 10 \
          --install \
          --reset-values \
          --set 'image.tag=${{ inputs.version }}' \
          --set 'version=${{ inputs.version }}' \
          --timeout 10m \
          --wait \
          --set env.GH_AUTH_TOKEN="${{ inputs.gh_auth_token }}" \
          --set env.RUNNER_LABEL="${{ inputs.runner_label }}" \
          --set env.RUNNER_GROUP="${{ inputs.runner_group }}" \
          --set env.GH_ORG="${{ inputs.github_org  }}"
