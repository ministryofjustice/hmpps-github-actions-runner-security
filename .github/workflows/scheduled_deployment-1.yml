name: Scheduled deployment

on:
  schedule:
    - cron: "30 00,12 * * *"  # Every 12 hours - needs to complete before OWASP scans start from 03:00

  workflow_dispatch:

jobs:
  build-runner:
    permissions:
      contents: read
      pull-requests: write
      deployments: write
      packages: write
    name: Build
    uses: ./.github/workflows/build-runner.yml
    with:
      push: true
    secrets: inherit

  deploy-to-prod:
    name: Deploy to prod
    uses: ./.github/workflows/deploy.yml
    needs:
      - build-runner
    with:
      environment: production
      version: 'latest-prod'
    secrets: inherit
    permissions:
      contents: read
      deployments: write
      pull-requests: write

  runner-cleanup:
    name: Remove old runners
    uses: ./.github/workflows/runner-cleanup.yml
    needs: deploy-to-prod
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write

