apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hmpps-github-actions-runner-security.fullname" . }}
  labels:
    {{- include "hmpps-github-actions-runner-security.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "hmpps-github-actions-runner-security.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "hmpps-github-actions-runner-security.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hmpps-github-actions-runner-security.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: runner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # Injected by Kubernetes Downward API - used in entrypoint.sh to derive
            # the correct NVD_API_KEY_NN from the pod ordinal
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # All other env vars come from values.env and are set via --set at deploy time.
            # To change which variables are injected, update the env: block in values.yaml
            # and the corresponding --set flags in the deploy action — the template itself
            # does not need to change.
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: runners-cache
              mountPath: /opt/vulnz/cache
              subPath: cache
          readinessProbe:
            exec:
              command: [cat, /tmp/runner.ready]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: runners-cache
      spec:
        accessModes: [ReadWriteOnce]
        storageClassName: {{ .Values.persistence.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}