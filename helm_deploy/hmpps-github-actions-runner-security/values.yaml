---
# Number of runner pods in the StatefulSet.
# Each pod gets its own PVC and derives its NVD API key from its ordinal (0-indexed).
replicaCount: 4

image:
  repository: ghcr.io/ministryofjustice/hmpps-github-actions-runner-security
  tag: latest-prod   # overridden at deploy time via --set image.tag=<version>
  pullPolicy: Always

# The Kubernetes secret that holds NVD_API_KEY_01..04, GH_AUTH_TOKEN, etc.
secret:
  name: hmpps-github-actions-runner-security

runner:
  org: ""          # set via --set runner.org=... or environment secret
  label: ""        # set via --set runner.label=...
  group: ""        # set via --set runner.group=...
  ephemeral: "false"

persistence:
  storageClassName: gp3
  size: 2Gi

resources:
  requests:
    memory: "512Mi"
    cpu: "100m"
  limits:
    memory: "4Gi"
    cpu: "2"
