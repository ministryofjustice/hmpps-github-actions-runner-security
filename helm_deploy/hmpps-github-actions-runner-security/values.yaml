---
# Number of runner pods. Each pod registers as a separate GitHub Actions runner.
replicaCount: 4

image:
  repository: ghcr.io/ministryofjustice/hmpps-github-actions-runner-security
  tag: xxx         # overridden at deploy time via --set image.tag=<version>
  pullPolicy: Always

env:
  GH_AUTH_TOKEN: ""     # GitHub PAT — set via --set at deploy time
  RUNNER_LABELS: ""     # comma-separated runner label(s) for this repo-level runner
  RUNNER_GROUP: ""      # Runner group
  GH_ORG: ""            # Organisation
  EPHEMERAL: "false"    # this needs to be false, I think - the token won't refresh otherwise

# Resource requests/limits for the runner container.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# Persistent volume claim settings for the shared cache volume.
persistence:
  storageClassName: gp3
  size: 2Gi

