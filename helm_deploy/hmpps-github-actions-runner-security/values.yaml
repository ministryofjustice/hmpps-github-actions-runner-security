---
# Number of runner pods. Each pod registers as a separate GitHub Actions runner.
replicaCount: 4

# Name of the pre-existing Kubernetes secret to load as environment variables.
# Must contain NVD_API_KEY_01..04 (and any other secrets the runner needs).
secretName: hmpps-github-actions-runner-security

image:
  repository: ghcr.io/ministryofjustice/hmpps-github-actions-runner-security
  tag: xxx         # overridden at deploy time via --set image.tag=<version>
  pullPolicy: Always

env:
  GH_AUTH_TOKEN: ""     # GitHub PAT — set via --set at deploy time
  RUNNER_LABEL: ""     # comma-separated runner label(s) for this repo-level runner
  RUNNER_GROUP: ""      # Runner group
  GH_ORG: ""            # Organisation
  EPHEMERAL: "false"    # this needs to be false, I think - the token won't refresh otherwise

# Resource requests/limits for the runner container.
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# Persistent volume claim settings for the shared cache volume.
persistence:
  storageClassName: gp3
  size: 2Gi

# Severity label for custom PrometheusRule alerts (used by Alertmanager routing).
alertSeverity: hmpps-sre-alerts-prod

# -- generic-prometheus-alerts sub-chart configuration
# Provides standard Kubernetes alerts (CrashLoopBackOff, OOMKilled, etc.)
generic-prometheus-alerts:
  targetApplication: hmpps-github-actions-runner-security
  # StatefulSet pods are named <name>-0, <name>-1, etc. — override the default
  # Deployment pod regex so alerts match correctly.
  podTargetOverride: "hmpps-github-actions-runner-security-[0-9]+"
  alertSeverity: hmpps-sre-alerts-prod

